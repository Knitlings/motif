name: Deploy Dependabot Updates to Production

on:
  workflow_run:
    workflows: ["Dependabot Auto-merge to Staging"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Create or update staging → main PR and enable auto-merge
        run: |
          EXISTING_PR=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            PR_URL=$(gh pr create \
              --base main \
              --head staging \
              --title "chore: Dependabot dependency updates" \
              --body "Automated merge of Dependabot dependency updates from staging to main.")
            gh pr merge --auto --squash "$PR_URL"
          else
            echo "PR #$EXISTING_PR already exists, enabling auto-merge"
            gh pr merge --auto --squash "$EXISTING_PR"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
